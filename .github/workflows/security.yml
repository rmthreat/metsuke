# Security workflow — static analysis of the workflows themselves + a runtime
# CI/CD sensor.
#
# Supply-chain hardening: every external action is pinned to a full commit SHA
# (version tag in the trailing comment).
#
# Note: this is a dependency-free vanilla-JS extension (no package.json / no
# node_modules), so there are no dependency or malicious-package scans here —
# there is nothing to scan. If real dependencies are ever introduced, add
# `npm audit` + a malicious-package scan at that point.

name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 4 * * 1'   # weekly, Monday 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Runtime CI/CD security sensor (eBPF) — start it first so it observes the
      # rest of the job. Pre-release tool, so don't fail the build on sensor issues.
      - name: cicd-sensor (runtime CI/CD EDR)
        continue-on-error: true
        uses: cicd-sensor/cicd-sensor-action@777ddaafc9ec2e09c9779cdb860e75906adc19c2 # v0.0.34

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Static analysis of the GitHub Actions workflows (pinned actions, injection,
      # permissions, etc.). Prints findings to the console and fails on issues.
      - name: zizmor (GitHub Actions SAST)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
